[book]
title = "Memora"
description = "Verifiable cognitive memory for personal vaults. Cite-or-it-didn't-happen."
authors = ["Rado Tsvetkov"]
language = "en"
src = "src"

[output.html]
site-url = "/memora/docs/"
git-repository-url = "https://github.com/radotsvetkov/memora"
edit-url-template = "https://github.com/radotsvetkov/memora/edit/main/docs/src/{path}"
additional-css = ["theme/custom.css"]
no-section-label = false
fold.enable = true
fold.level = 1

[output.html.search]
enable = true
limit-results = 20
teaser-word-count = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1

[preprocessor.index]
[preprocessor.links]
